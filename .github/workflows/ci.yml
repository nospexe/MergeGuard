name: CI

on:
  push:
    branches:
      - main
      - dev/**
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: |
          cd backend
          ruff check . --ignore E501,E402,F401

  test:
    name: Test Suite (all engines + API)
    runs-on: ubuntu-latest
    needs: lint

    env:
      OLLAMA_HOST: "http://localhost:11434"
      OLLAMA_MODEL: "deepseek-coder"
      PYTHONPATH: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx ruff

      - name: Configure Git (required by conftest valid_repo fixture)
        run: |
          git config --global user.email "ci@mergeguard.dev"
          git config --global user.name "MergeGuard CI"

      - name: Run BlastRadius engine tests
        run: |
          cd backend
          pytest tests/test_blast_radius.py -v --tb=short

      - name: Run CoverageOverlay engine tests
        run: |
          cd backend
          pytest tests/test_coverage_overlay.py -v --tb=short

      - name: Run PostMortem engine tests
        run: |
          cd backend
          pytest tests/test_post_mortem.py -v --tb=short

      - name: Run API integration tests
        run: |
          cd backend
          pytest tests/test_api.py -v --tb=short

      - name: Run full test suite (aggregate)
        run: |
          cd backend
          pytest tests/ -v --tb=short -q

  build-check:
    name: Docker Build Check (backend)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          docker build -f backend/Dockerfile -t mergeguard-backend:ci .

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build