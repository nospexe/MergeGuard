name: CI

on:
  push:
    branches:
      - main
      - dev/**
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: |
          cd backend
          ruff check . --ignore E501,E402,F401,F811

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    env:
      OLLAMA_HOST: "http://localhost:11434"
      OLLAMA_MODEL: "deepseek-coder"
      PYTHONPATH: backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Configure Git identity
        run: |
          git config --global user.email "ci@mergeguard.dev"
          git config --global user.name "MergeGuard CI"

      - name: Run BlastRadius tests
        run: |
          cd backend
          pytest tests/test_blast_radius.py -v --tb=short

      - name: Run CoverageOverlay tests
        run: |
          cd backend
          pytest tests/test_coverage_overlay.py -v --tb=short

      - name: Run PostMortem tests
        run: |
          cd backend
          pytest tests/test_post_mortem.py -v --tb=short

      - name: Run API tests
        run: |
          cd backend
          pytest tests/test_api.py -v --tb=short

  build-backend:
    name: Docker Build Check (backend)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile backend/ -t mergeguard-backend:ci

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run build