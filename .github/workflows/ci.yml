name: CI

on:
  push:
    branches:
      - main
      - dev/*
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run BlastRadius + CoverageOverlay tests (pytest)
        run: |
          cd backend
          pytest tests/test_blast_radius.py tests/test_coverage_overlay.py -v

      - name: Run API tests (pytest)
        run: |
          cd backend
          pytest tests/test_api.py -v

      - name: Run PostMortem tests
        run: |
          cd backend
          python3 tests/test_post_mortem.py

      - name: Run legacy test runner (smoke check)
        run: |
          cd backend
          python3 run_tests.py