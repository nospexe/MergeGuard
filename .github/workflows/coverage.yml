name: Coverage

on:
  push:
    branches:
      - main
      - dev/**
  pull_request:
    branches:
      - main

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest

    env:
      OLLAMA_HOST: "http://localhost:11434"
      OLLAMA_MODEL: "deepseek-coder"
      PYTHONPATH: backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx coverage[toml]

      - name: Configure Git identity
        run: |
          git config --global user.email "ci@mergeguard.dev"
          git config --global user.name "MergeGuard CI"

      - name: Run tests with coverage
        run: |
          cd backend
          coverage run \
            --source=engines,agents,api,utils,db \
            -m pytest tests/ -v --tb=short
          coverage report \
            --omit="tests/*,run_tests.py" \
            --fail-under=80
          coverage xml \
            --omit="tests/*,run_tests.py" \
            -o coverage.xml

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml

      - name: Generate HTML report
        run: |
          cd backend
          coverage html --omit="tests/*,run_tests.py" -d htmlcov

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: backend/htmlcov/

      - name: Print coverage summary
        run: |
          cd backend
          coverage report --omit="tests/*,run_tests.py" --show-missing